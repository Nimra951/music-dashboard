<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --spotify-green: #1DB954;
      --spotify-dark: #121212;
      --spotify-darker: #000000;
      --spotify-gray: #181818;
      --spotify-light-gray: #282828;
      --spotify-text: #B3B3B3;
    }

    body {
      background-color: var(--spotify-dark);
      color: #FFFFFF;
    }

    .navbar {
      background-color: var(--spotify-darker) !important;
      border-bottom: 1px solid #282828;
    }

    .navbar-brand {
      color: var(--spotify-green) !important;
      font-weight: 700;
    }

    .nav-link {
      color: var(--spotify-text) !important;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #FFFFFF !important;
    }

    h1, h2, h3 {
      color: #FFFFFF;
    }

    label, p, form p, td, th {
      color: #FFFFFF !important;
    }

    a {
      color: var(--spotify-green);
    }

    a:hover {
      color: #1ed760;
    }

    .btn, button {
      background-color: var(--spotify-green);
      color: #000000;
      border: none;
      border-radius: 20px;
      font-weight: 600;
      padding: 8px 24px;
    }

    .btn:hover, button:hover {
      background-color: #1ed760;
      color: #000000;
    }

    input, select, textarea {
      background-color: var(--spotify-light-gray) !important;
      color: #FFFFFF !important;
      border: 1px solid #404040 !important;
      border-radius: 6px !important;
    }

    input::placeholder {
      color: var(--spotify-text) !important;
    }

    .card, .chart-card {
      background-color: var(--spotify-gray);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid #282828;
    }

    table {
      color: #FFFFFF;
    }

    table, th, td {
      border-color: #282828 !important;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="{% url 'home' %}">🎵 Music Dashboard</a>
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'search' %}">Search</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'add_song' %}">Add Song</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'charts' %}">Charts</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'insights' %}">Insights</a></li>
    </ul>
    <ul class="navbar-nav ms-auto">
      {% if user.is_authenticated %}
        <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="/accounts/logout/">Logout</a></li>
      {% else %}
        <li class="nav-item"><a class="nav-link" href="/accounts/login/">Login</a></li>
      {% endif %}
    </ul>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}
  {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
