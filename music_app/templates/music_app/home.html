
{% extends 'base.html' %}

{% block content %}<h1>Music Dashboard</h1>


<hr>

{% for song in songs %}
    <p>
        {{ song.title }} - {{ song.artist }} ({{ song.genre }})

        <a href="{% url 'edit_song' song.id %}">Edit</a>
        <a href="{% url 'delete_song' song.id %}">Delete</a>
    </p>
{% empty %}
    <p>No songs yet</p>
{% endfor %}
{% endblock %}
